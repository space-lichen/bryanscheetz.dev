<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>POST TITLE — Bryan Scheetz</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Consolas, 'Courier New', monospace;
      font-weight: bold;
      background: #0f0f0f;
      color: #d4d4d4;
      max-width: 680px;
      margin: 60px auto;
      padding: 0 24px;
      font-size: 14px;
      line-height: 1.7;
    }

    h1 { font-size: 1.4rem; font-weight: normal; color: #f0f0f0; margin-bottom: 4px; }
    h2 { font-size: 1rem; font-weight: normal; color: #ccc; margin: 28px 0 8px; }
    h3 { font-size: 0.9rem; font-weight: normal; color: #aaa; margin: 20px 0 6px; }

    hr { border: none; border-top: 1px solid #222; margin: 20px 0; }

    p { color: #bbb; margin: 0 0 14px; }

    a { color: #7eb8d4; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .back { color: #555; font-size: 0.85rem; }
    .back:hover { color: #aaa; text-decoration: none; }

    .meta { color: #444; font-size: 0.8rem; margin-top: 4px; }

    code {
      background: #1a1a1a;
      color: #ce9178;
      padding: 1px 5px;
      border-radius: 2px;
      font-size: 0.9em;
    }

    pre {
      background: #1a1a1a;
      border-left: 2px solid #333;
      padding: 14px 16px;
      overflow-x: auto;
      margin: 16px 0;
    }

    pre code {
      background: none;
      padding: 0;
      color: #d4d4d4;
    }

    blockquote {
      border-left: 2px solid #333;
      margin: 0 0 14px;
      padding-left: 16px;
      color: #666;
    }
  </style>
</head>
<body>

  <a href="/blog/" class="back">&larr; blog</a>

  <h1>POST TITLE</h1>
  <p class="meta">YYYY-MM-DD</p>

  <hr>

  <p>Write your post content here.</p>

</body>
</html>
