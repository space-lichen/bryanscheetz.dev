<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog — Bryan Scheetz</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Consolas, 'Courier New', monospace;
      font-weight: bold;
      background: #0f0f0f;
      color: #d4d4d4;
      max-width: 680px;
      margin: 60px auto;
      padding: 0 24px;
      font-size: 14px;
      line-height: 1.7;
    }

    h1 { font-size: 1.4rem; font-weight: normal; color: #f0f0f0; margin-bottom: 4px; }
    h2 { font-size: 0.85rem; font-weight: normal; color: #888; text-transform: uppercase; letter-spacing: 0.1em; margin: 32px 0 10px; }

    hr { border: none; border-top: 1px solid #222; margin: 20px 0; }

    a { color: #7eb8d4; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .back { color: #555; font-size: 0.85rem; }
    .back:hover { color: #aaa; text-decoration: none; }

    ul { list-style: none; padding: 0; margin: 0; }

    .post-entry {
      padding: 10px 0;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
    }

    .post-entry:last-child { border-bottom: none; }

    .post-title { color: #7eb8d4; }
    .post-date { color: #444; font-size: 0.8rem; white-space: nowrap; }
  </style>
</head>
<body>

  <a href="/" class="back">&larr; home</a>

  <h1>Blog</h1>
  <p style="color:#666; margin-top:4px;">notes on software and process control</p>

  <hr>

  <ul>
    <!-- Add new posts here, newest first:
    <li class="post-entry">
      <a class="post-title" href="posts/your-post-slug.html">Post Title</a>
      <span class="post-date">YYYY-MM-DD</span>
    </li>
    -->
    <li class="post-entry">
      <a class="post-title" href="posts/hello-world.html">Hello World</a>
      <span class="post-date">2026-03-29</span>
    </li>
  </ul>

</body>
</html>
